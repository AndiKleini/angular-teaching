<main>
    <h1 style="margin-bottom: 1rem; color: #2c3e50;">Welcome to your Smart Home Dashboard</h1>
    <h2 style="margin-bottom: 1rem; color: #2c3e50;">Alarm</h2>
    <div style="display: flex; align-items: center; gap: 1rem;">
        <div class="alarm-block">
            <div [ngClass]="isAlarmActive ? 'alarm-light-active' : 'alarm-light'"></div>
            <div [ngClass]="isAlarmActive ? 'alarm-status-active' : 'alarm-status'">INACTIVE</div>
            <button class="alarm-btn" (click)="toggleAlarmGlobally()">TOGGLE</button>
        </div>
       <div class="thermostat-control">
            <div class="dial">
                <div class="inner-circle">
                    <div id="status" class="heating">Heating</div>
                    <div class="target-control">
                        <button (click)="changeTemperature(-0.5)">-</button>
                        <span id="target-temp">23</span>
                        <button (click)="changeTemperature(0.5)">+</button>
                    </div>
                </div>
            </div>
        </div>
        <div>
             <section class="events-log">
        <h2>Letzte Ereignisse</h2>
        <ul>
        @for( event of (houseEvents | async); track event.timestamp) {
            <li class="event-item">
                <span class="time">{{event.timestamp | getTime }}</span>
                <span class="message">{{event.message}}</span>
            </li>
        }
        </ul>
    </section>
        </div>
    </div>
    <h2 style="margin-bottom: 1rem; color: #2c3e50;">Your Rooms</h2>
    <div class="room-grid">
        @for(room of rooms; track $index) {
            <app-room-tile [roomId]="room.id" (toggleAlarm)="toggleAlarm($event)"></app-room-tile>
        }
    </div>
</main>
