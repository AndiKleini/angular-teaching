<main>
    <h1 style="margin-bottom: 1rem; color: #2c3e50;">Welcome to your Smart Home Dashboard</h1>
    <h2 style="margin-bottom: 1rem; color: #2c3e50;">Alarm</h2>
    <div class="alarm-block">
        <div [ngClass]="isAlarmActive ? 'alarm-light-active' : 'alarm-light'"></div>
        <div [ngClass]="isAlarmActive ? 'alarm-status-active' : 'alarm-status'">INACTIVE</div>
        <button class="alarm-btn" (click)="toggleAlarmGlobally()">TOGGLE</button>
    </div>
    <h2 style="margin-bottom: 1rem; color: #2c3e50;">Your Rooms</h2>
    <div class="room-grid">

        @for(room of rooms; track $index) {
            <app-room-tile [roomId]="room.id" (toggleAlarm)="toggleAlarm($event)"></app-room-tile>
        }

    </div>
</main>
