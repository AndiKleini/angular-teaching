spring.datasource.url=jdbc:h2:mem:swen2-db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
# In-memory H2 is JVM-local and torn down with the test process, so no password is needed.
# Best practice for any non-throwaway database (Postgres, H2 in server/file mode, anything reachable
# over a network or persisted to disk): never commit credentials to source control. Inject them via
# environment variables or a secrets manager, e.g. spring.datasource.password=${DB_PASSWORD},
# and grant the DB user only the privileges the app actually needs.
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

greeter.language=DE
