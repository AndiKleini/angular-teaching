server.port=8080
logging.level.org.springframework.web= DEBUG

spring.datasource.url=jdbc:postgresql://localhost:5000/swen2-db
spring.datasource.username=postgres
spring.datasource.password=mysecret-d

# Allow the API to start without a running Postgres. Three things are needed:
#  1. Hikari skips its boot connection probe (initialization-fail-timeout=-1).
#  2. Hibernate skips its JDBC-metadata lookup; the dialect is supplied explicitly so it
#     doesn't need the DB to figure that out.
#  3. ddl-auto=none — with `update` Hibernate would still acquire a connection at boot to
#     run schema export, which would time out and fail startup. As a consequence the
#     login_credentials table must already exist when Postgres is first contacted; create
#     it once with ddl-auto=update against a live DB, or via SQL.
# DB-backed requests fail at first use until Postgres is up; non-DB endpoints work normally.
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE

greeter.language=DE